# Build the project site (site/) and deploy it to GitHub Pages.
# PRs that touch the site get a build check; pushes to main deploy.
name: Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'
  pull_request:
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          # Matches package.json engines; Astro's toolchain needs >= 22.12.
          node-version: '22.19.0'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install
      - name: Build site
        run: yarn workspace @swarmbase/site build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: false
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
